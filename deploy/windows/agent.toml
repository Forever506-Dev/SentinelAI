# SentinelAI Agent Configuration — Windows Deployment
#
# Replace SENTINEL_SERVER_IP with the IP of your SentinelAI server
# (the machine running the backend + panel).

# Backend Connection
backend_url = "http://SENTINEL_SERVER_IP:8000/api/v1"
# auth_token = ""             # Populated automatically after first registration
# hmac_key = ""               # HMAC-SHA256 key — auto-provisioned during registration

# Command Signing
require_command_signing = true  # Require HMAC signatures on destructive commands

# Timing
heartbeat_interval_secs = 15
telemetry_batch_size = 50

# Collectors
[collectors]
process_enabled = true
filesystem_enabled = true
network_enabled = true
system_info_enabled = true
process_interval_secs = 10
network_interval_secs = 15
system_info_interval_secs = 30

# Watched Paths (Windows defaults)
watch_paths = ["C:\\Users", "C:\\Windows\\System32", "C:\\Windows\\Temp", "C:\\ProgramData"]

# File Hash Extensions
hash_extensions = ["exe", "dll", "sys", "bat", "cmd", "ps1", "vbs", "js", "msi", "scr"]
