# NATS JetStream Configuration — SentinelAI Production
#
# This configuration is for a single-node development/staging deployment.
# For production, deploy a 3-node cluster with routes{} configured.

# ─── Server Identity ─────────────────────────────────────────────
server_name: sentinel-nats-0

# ─── Client Connections ──────────────────────────────────────────
port: 4222
max_connections: 65536
max_payload: 8MB

# ─── Monitoring ──────────────────────────────────────────────────
http_port: 8222

# ─── JetStream ───────────────────────────────────────────────────
jetstream {
  store_dir: /data/jetstream
  max_mem: 2G
  max_file: 50G
}

# ─── TLS (inter-service) ────────────────────────────────────────
# tls {
#   cert_file: /certs/server.crt
#   key_file: /certs/server.key
#   ca_file: /certs/ca.crt
#   verify: true
# }

# ─── Authorization ───────────────────────────────────────────────
# Multi-tenant account isolation.
# Each tenant gets a separate NATS account with isolated JetStream.
#
# In production, use NATS account resolver (nsc) or JWT-based auth.
# This example uses static accounts for development.

accounts {
  # ── System Account ─────────────────────────────────────────────
  SYS {
    users: [
      { user: sys, password: $NATS_SYS_PASSWORD }
    ]
  }

  # ── Ingestion Gateway Account ─────────────────────────────────
  # Can publish to TELEMETRY.raw.* only.
  INGESTION {
    jetstream: enabled
    users: [
      { user: ingestion, password: $NATS_INGESTION_PASSWORD }
    ]
    exports: [
      { stream: "TELEMETRY.raw.>" }
    ]
  }

  # ── Detection Engine Account ──────────────────────────────────
  # Can subscribe to TELEMETRY.normalized.*, publish to DETECTION.alerts.*
  DETECTION {
    jetstream: enabled
    users: [
      { user: detection, password: $NATS_DETECTION_PASSWORD }
    ]
    imports: [
      { stream: { account: INGESTION, subject: "TELEMETRY.raw.>" } }
    ]
    exports: [
      { stream: "DETECTION.alerts.>" }
    ]
  }

  # ── Storage Account ──────────────────────────────────────────
  STORAGE {
    jetstream: enabled
    users: [
      { user: storage, password: $NATS_STORAGE_PASSWORD }
    ]
    imports: [
      { stream: { account: INGESTION, subject: "TELEMETRY.raw.>" } }
      { stream: { account: DETECTION, subject: "DETECTION.alerts.>" } }
    ]
  }

  # ── API Account ──────────────────────────────────────────────
  API {
    jetstream: enabled
    users: [
      { user: api, password: $NATS_API_PASSWORD }
    ]
    imports: [
      { stream: { account: DETECTION, subject: "DETECTION.alerts.>" } }
    ]
  }
}

system_account: SYS

# ─── Cluster (Production) ──────────────────────────────────────
# Uncomment for 3-node cluster deployment.
# cluster {
#   name: sentinel-cluster
#   port: 6222
#   routes: [
#     nats-route://sentinel-nats-1:6222
#     nats-route://sentinel-nats-2:6222
#   ]
# }

# ─── Logging ────────────────────────────────────────────────────
debug: false
trace: false
logtime: true
log_file: /data/nats.log
log_size_limit: 100MB
