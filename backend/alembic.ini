# SentinelAI Alembic Configuration
#
# Database migration management for the backend.
# The sqlalchemy.url is overridden at runtime by alembic/env.py
# using the DATABASE_URL from app.core.config.settings.

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Truncate long revision identifiers in file names
truncate_slug_length = 40

# Timezone for revision file timestamps (UTC recommended)
timezone = UTC

# Prepend sys.path so that `app` package is importable
prepend_sys_path = .

# Max length for column in online operation
# sqlalchemy.url is set programmatically in env.py — do not set here.

[post_write_hooks]
# (Optional) Run ruff after generating a migration
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
